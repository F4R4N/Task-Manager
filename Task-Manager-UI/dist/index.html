<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager • Home</title>
    <link rel="icon" href="/assets/favicon-D4tobXsL.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/pico.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
  <script type="module" crossorigin src="/assets/main-CTutvIBt.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/api-BS3n0N4v.js">
  <link rel="stylesheet" crossorigin href="/assets/main-CTvI5zZ5.css">
</head>

<body>
    <main id="app">
        <div id="main-content" class="main-content">
            <div class="main-actions-container">
                <button class="no-pico btn new-task-btn add" data-status="todo">
                    New Task
                </button>
                <button class="no-pico btn search-btn" id="searchBtn">
                    Search
                </button>
            </div>
            <div class="columns">
                <div class="column" id="todo">
                    <div class="column-title">
                        <span class="col-title-text">To Do</span>
                        <span class="plus add" data-status="todo">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>

                <div class="column" id="in_progress">
                    <div class="column-title">
                        <span class="col-title-text">In Progress</span>
                        <span class="plus add" data-status="in_progress">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
                <div class="column" id="review">
                    <div class="column-title">
                        <span class="col-title-text">Review</span>
                        <span class="plus add" data-status="review">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
                <div class="column" id="done">
                    <div class="column-title">
                        <span class="col-title-text">Done</span>
                        <span class="plus add" data-status="done">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
            </div>
        </div>
        <!-- Modal -->
        <div id="modalOverlay">
            <div class="modal">
                <span class="close-btn" id="closeBtn">&times;</span>
                <h2 id="modalHeader"></h2>
                <div class="modal-content">
                    <button class="btn delete-btn confirm-delete hide">Delete</button>
                    <div class="task-modal hide">
                        <form method="post" id="taskForm">
                            <div class="modal-section">
                                <label for="title">Title:</label>
                                <input type="text" id="title" maxlength="100" minlength="5" required />
                            </div>

                            <div class="modal-section">
                                <label for="description">Description:</label>
                                <textarea id="description" rows="3"></textarea>
                            </div>

                            <div class="modal-section">
                                <label for="assigneeSelect">Assignee:</label>
                                <select name="assignee" id="assigneeSelect">
                                    <option value="">-</option>
                                </select>
                            </div>

                            <div class="modal-section">
                                <label for="statusSelect">Status:</label>
                                <select name="status" id="statusSelect">
                                    <option value="todo">Todo</option>
                                    <option value="in_progress">In Progress</option>
                                    <option value="review">Review</option>
                                    <option value="done">Done</option>
                                </select>
                            </div>

                            <div class="modal-section">
                                <label for="prioritySelect">Priority:</label>
                                <select name="priority" id="prioritySelect">
                                    <option value="low">Low</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="high">High</option>
                                </select>
                            </div>
                            <button class="no-pico btn submit-btn" id="modalActionBtn"></button>

                        </form>
                    </div>
                    <div class="search-modal hide">
                        <input type="search" name="search" id="searchInput" placeholder="Search Task Title or Description..." autofocus>
                        <div class="search-results">

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- side modal (task detail modal) -->
        <div id="sideModal" class="side-modal">
            <div class="modal-content-right">
                <span class="close-btn" id="sideModalCloseBtn">&times;</span>
                <div id="modalTaskContent">
                    <p>Loading task details...</p>
                </div>
                <div class="action-container">
                    <button id="deleteBtn" class="btn delete-btn">Delete</button>
                    <button id="editBtn" class="btn edit-btn">Edit</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Task Card template -->
    <template id="task-template">
        <div class="card">
            <span class="card-title"></span>
            <span class="created-at"></span>
            <div class="card-bottom">
                <span class="badge"></span>
                <div class="assignee">
                    <span class="assignee-username"></span>
                    <span class="assignee-profile">
                        <img class="assignee-profile-pic assignee-avatar" src="" alt="">
                    </span>
                </div>
            </div>
        </div>
    </template>
</body>

</html>
