<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager • Home</title>
    <link rel="stylesheet" href="css/pico.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <main id="app">
        <div id="main-content" class="main-content">
            <div class="actions">
                <button class="no-pico btn new-task-btn add" data-status="todo">
                    New Task
                </button>
                <button class="no-pico btn search-btn" id="searchBtn">
                    Search
                </button>
            </div>
            <div class="columns">
                <div class="column" id="todo">
                    <div class="title">
                        <span class="col-title">To Do</span>
                        <span class="plus add" data-status="todo">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>

                <div class="column" id="in_progress">
                    <div class="title">
                        <span class="col-title">In Progress</span>
                        <span class="plus add" data-status="in_progress">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
                <div class="column" id="review">
                    <div class="title">
                        <span class="col-title">Review</span>
                        <span class="plus add" data-status="review">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
                <div class="column" id="done">
                    <div class="title">
                        <span class="col-title">Done</span>
                        <span class="plus add" data-status="done">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
            </div>
        </div>
        <!-- Modal -->
        <div id="modalOverlay">
            <div class="modal">
                <span class="close-btn" id="closeBtn">&times;</span>
                <div class="task-modal">
                    <form method="post" id="taskForm">
                        <div class="modal-header">
                            <h2 id="modalHeader"></h2>
                        </div>

                        <div class="modal-section">
                            <label>Title:</label>
                            <input type="text" id="title" maxlength="100" minlength="5" required />
                        </div>

                        <div class="modal-section">
                            <label>Description:</label>
                            <textarea id="description" rows="3"></textarea>
                        </div>

                        <div class="modal-section">
                            <label>Assignee:</label>
                            <select name="assignee" id="assigneeSelect">
                                <option value="">-</option>
                            </select>
                        </div>

                        <div class="modal-section">
                            <label>Status:</label>
                            <select name="status" id="statusSelect">
                                <option value="todo">Todo</option>
                                <option value="in_progress">In Progress</option>
                                <option value="review">Review</option>
                                <option value="done">Done</option>
                            </select>
                        </div>

                        <div class="modal-section">
                            <label>Priority:</label>
                            <select name="priority" id="prioritySelect">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <button class="no-pico btn submit-btn" id="modalActionBtn"></button>

                    </form>
                </div>
                <div class="search-modal">
                    <input type="search" name="search" id="searchInput">
                    <div class="search-results">

                    </div>
                </div>
            </div>
        </div>
        <!-- side modal (task detail modal) -->
        <div id="taskModal" class="side-modal">
            <div class="modal-content-right">
                <span class="close-btn">&times;</span>
                <div id="modalTaskContent">
                    <p>Loading task details...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Task Card -->
    <template id="task-template">
        <div class="card">
            <span class="card-title"></span>
            <span class="created-at"></span>
            <div class="card-bottom">
                <span class="badge"></span>
                <div class="assignee">
                    <span class="assignee-username"></span>
                    <span class="assignee-profile">
                        <img class="assignee-profile-pic assignee-avatar" src="" alt="">
                    </span>
                </div>
            </div>
        </div>
    </template>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
