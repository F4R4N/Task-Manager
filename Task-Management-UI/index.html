<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager • Home</title>
    <link rel="stylesheet" href="css/pico.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <main id="app">
        <div id="main-content" class="main-content">
            <button class="no-pico new-task-btn">
                New Task
            </button>
            <div class="columns">
                <div class="column" id="col-1">
                    <div class="title">
                        <span>To Do</span>
                        <span class="add">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>

                <div class="column" id="col-2">
                    <div class="title">
                        <span>In Progress</span>
                        <span class="add">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
                <div class="column" id="col-3">
                    <div class="title">
                        <span>Review</span>
                        <span class="add">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
                 <div class="column" id="col-4">
                    <div class="title">
                        <span>Done</span>
                        <span class="add">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
