<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager • Home</title>
    <link rel="stylesheet" href="css/pico.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <main id="app">
        <div id="main-content" class="main-content">
            <button class="no-pico new-task-btn">
                New Task
            </button>
            <div class="columns">
                <div class="column" id="todo">
                    <div class="title">
                        <span class="col-title">To Do</span>
                        <span class="add">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>

                <div class="column" id="inProgress">
                    <div class="title">
                        <span class="col-title">In Progress</span>
                        <span class="add">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
                <div class="column" id="review">
                    <div class="title">
                        <span class="col-title">Review</span>
                        <span class="add">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
                <div class="column" id="done">
                    <div class="title">
                        <span class="col-title">Done</span>
                        <span class="add">+</span>
                    </div>
                    <div class="cards">

                    </div>
                </div>
            </div>
        </div>
    </main>
    <template id="task-template">
        <div class="card">
            <span class="card-title"></span>
            <span class="created-at"></span>
            <div class="card-bottom">
                <span class="badge"></span>
                <div class="assignee">
                    <span class="assignee-username"></span>
                    <span class="assignee-profile">
                        <img class="assignee-profile-pic assignee-avatar" src="" alt="">
                    </span>
                </div>
            </div>
        </div>
    </template>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
